name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Build renderer and main
        run: yarn build

      - name: Package installers
        run: yarn electron-builder --${{ matrix.platform }} --publish never
        env:
          # Unsigned builds until signing secrets are configured — see docs/SIGNING.md
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            release/**/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten artifact paths for upload
        run: |
          mkdir -p release-assets
          find artifacts -type f \( \
            -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o \
            -name '*.AppImage' -o -name '*.deb' -o -name '*.blockmap' \
          \) -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}.build.${{ github.run_number }}
          name: KPort v${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          prerelease: true
          generate_release_notes: true
          body: |
            Automated installers built from `main` @ [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

            | Platform | Artifacts |
            |----------|-----------|
            | macOS | `.dmg`, `.zip` |
            | Windows | `.exe` (NSIS installer) |
            | Linux | `.AppImage`, `.deb` |

            > Unsigned builds from CI. Bump `version` in `package.json` before merging when you want a new release line.
          files: release-assets/*
          fail_on_unmatched_files: true
